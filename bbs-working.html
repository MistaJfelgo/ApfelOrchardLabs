<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apfel Orchard BBS</title>
  <meta name="description" content="Stable full-tab browser terminal for the Apfel Orchard BBS.">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #000; color: #f8e7bd; }
    body { font-family: Consolas, "Cascadia Mono", "Courier New", monospace; overflow: hidden; }
    .bar { height: 42px; display: flex; align-items: center; gap: 14px; padding: 0 12px; box-sizing: border-box; background: #0e0501; border-bottom: 1px solid rgba(255, 180, 80, .25); color: #f8e7bd; }
    .state { color: #ffb347; }
    .terminal-wrap { height: calc(100vh - 42px); overflow: auto; background: #000; }
    #terminal { min-height: 100%; margin: 0; padding: 18px 0 48px 0; box-sizing: border-box; white-space: pre-wrap; word-break: normal; overflow-wrap: normal; font-size: 16px; line-height: 1.18; color: #f7e9c6; outline: none; }
    .cursor { display: inline-block; width: .58em; height: 1.05em; background: #ffbd58; vertical-align: -0.12em; animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    ::selection { background: #ffbd58; color: #000; }
  </style>
</head>
<body>
  <div class="bar">
    <span>Apfel Orchard BBS</span>
    <span class="state" id="state">Connecting</span>
  </div>
  <div class="terminal-wrap" id="scrollbox">
    <pre id="terminal" tabindex="0" aria-label="Apfel Orchard BBS terminal"></pre>
  </div>

  <script>
    const ENDPOINT = "wss://bbs.apfelorchardlabs.org/";
    const term = document.getElementById("terminal");
    const state = document.getElementById("state");
    const scrollbox = document.getElementById("scrollbox");
    let socket;
    let closed = false;

    function write(text) {
      term.textContent += text;
      scrollbox.scrollTop = scrollbox.scrollHeight;
    }

    function setState(text) { state.textContent = text; }

    function connect() {
      setState("Connecting");
      socket = new WebSocket(ENDPOINT);
      socket.binaryType = "arraybuffer";

      socket.addEventListener("open", () => {
        closed = false;
        setState("Connected");
        document.title = "Apfel Orchard BBS - Connected";
        term.focus();
      });

      socket.addEventListener("message", async (event) => {
        if (typeof event.data === "string") {
          write(event.data);
        } else if (event.data instanceof Blob) {
          const buf = await event.data.arrayBuffer();
          write(new TextDecoder("utf-8", { fatal: false }).decode(buf));
        } else {
          write(new TextDecoder("utf-8", { fatal: false }).decode(event.data));
        }
      });

      socket.addEventListener("close", () => {
        if (!closed) write("\n[connection closed]\n");
        closed = true;
        setState("Disconnected");
        document.title = "Apfel Orchard BBS - Disconnected";
      });

      socket.addEventListener("error", () => {
        setState("Error");
      });
    }

    function send(data) {
      if (socket && socket.readyState === WebSocket.OPEN) socket.send(data);
    }

    document.addEventListener("keydown", (event) => {
      if (event.ctrlKey && event.key.toLowerCase() === "r") return;
      if (event.ctrlKey && event.key.toLowerCase() === "c") return;
      if (event.altKey || event.metaKey) return;

      if (event.key === "Enter") { event.preventDefault(); send("\r"); return; }
      if (event.key === "Backspace") { event.preventDefault(); send("\b"); return; }
      if (event.key === "Tab") { event.preventDefault(); send("\t"); return; }
      if (event.key === "Escape") { event.preventDefault(); send("\x1b"); return; }
      if (event.key === "ArrowUp") { event.preventDefault(); send("\x1b[A"); return; }
      if (event.key === "ArrowDown") { event.preventDefault(); send("\x1b[B"); return; }
      if (event.key === "ArrowRight") { event.preventDefault(); send("\x1b[C"); return; }
      if (event.key === "ArrowLeft") { event.preventDefault(); send("\x1b[D"); return; }
      if (event.key.length === 1) { event.preventDefault(); send(event.key); }
    });

    window.addEventListener("beforeunload", () => {
      if (socket && socket.readyState === WebSocket.OPEN) socket.close();
    });

    connect();
  </script>
</body>
</html>
